image:
  repository: postgres
  tag: 14-alpine
  pullPolicy: Always

service:
  port: 5432

auth:
  username: admin
  database: sneakerdb
  password: replace-with-cluster-secret

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  storageClass: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
