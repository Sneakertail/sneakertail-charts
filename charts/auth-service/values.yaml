replicaCount: 1

image:
  repository: ghcr.io/sneakertail/auth-service
  tag: dev
  pullPolicy: Always

rollout:
  autoPromotionEnabled: false
  previewReplicaCount: 1
  scaleDownDelaySeconds: 30

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

config:
  enabled: true
  data:
    PORT: "3001"
    ADMIN_USERNAME: admin
    ADMIN_EMAIL: admin@sneakertail.com
    DEMO_USERNAME: user
    DEMO_EMAIL: user@sneakertail.com

secret:
  enabled: true
  stringData:
    JWT_SECRET: replace-with-cluster-secret
    ADMIN_PASSWORD: replace-with-cluster-secret
    DEMO_PASSWORD: replace-with-cluster-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
