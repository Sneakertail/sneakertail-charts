apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
