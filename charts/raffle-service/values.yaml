replicaCount: 2

image:
  repository: sneakertail/raffle-service
  tag: latest
  pullPolicy: IfNotPresent

rollout:
  autoPromotionEnabled: false
  previewReplicaCount: 1
  scaleDownDelaySeconds: 30

service:
  type: ClusterIP
  port: 3003
  targetPort: 3003

config:
  enabled: true
  data:
    PORT: "3003"
    REDIS_URL: "redis://redis:6379"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
