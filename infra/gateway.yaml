apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kgateway
  namespace: dev
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: gateway-config
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
