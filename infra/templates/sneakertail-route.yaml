{{- if .Values.routes.sneakertail.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sneakertail-route
  namespace: {{ .Values.routes.sneakertail.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.global.namespace | quote }}
  hostnames:
    - {{ .Values.routes.sneakertail.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3001
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: product-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3002
    - matches:
        - path:
            type: PathPrefix
            value: /api/raffle
      backendRefs:
        - name: raffle-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3003
    - matches:
        - path:
            type: PathPrefix
            value: /api/payment
      backendRefs:
        - name: payment-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3005
    - matches:
        - path:
            type: PathPrefix
            value: /api/cart
      backendRefs:
        - name: interaction-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3004
    - matches:
        - path:
            type: PathPrefix
            value: /api/wishlist
      backendRefs:
        - name: interaction-service-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 3004
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-active
          namespace: {{ .Values.routes.sneakertail.backendNamespace | quote }}
          port: 80
{{- end }}
