{{- if .Values.routes.headlamp.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: {{ .Values.routes.headlamp.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.global.namespace | quote }}
  hostnames:
    - {{ .Values.routes.headlamp.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.routes.headlamp.serviceName }}
          port: {{ .Values.routes.headlamp.servicePort }}
{{- end }}
