{{- if .Values.routes.argorollouts.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argorollouts-route
  namespace: {{ .Values.routes.argorollouts.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.global.namespace | quote }}
  hostnames:
    - {{ .Values.routes.argorollouts.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.routes.argorollouts.serviceName }}
          port: {{ .Values.routes.argorollouts.servicePort }}
{{- end }}
