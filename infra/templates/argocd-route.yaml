{{- if .Values.routes.argocd.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: {{ .Values.routes.argocd.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.global.namespace | quote }}
  hostnames:
    - {{ .Values.routes.argocd.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.routes.argocd.serviceName }}
          port: {{ .Values.routes.argocd.servicePort }}
{{- end }}
